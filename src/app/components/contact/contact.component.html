<div class="contact-section" id="contact">
  <header>
    <h3 class="navigation-title">
      Contact
      <span>Me</span>
    </h3>
  </header>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="container contact-container">
    <div class="input-group-box">
      <div class="input-box">
        <label>Full Name</label>
        <input type="text" placeholder="Ex: John Doe" formControlName="fullName" required>
      </div>
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Ex: example@gmail.com" formControlName="email" required>
      </div>
      <div class="input-box">
        <label>Subject</label>
        <input type="text" placeholder="Ex: Build startup website" formControlName="subject" required>
      </div>
    </div>
    <div class="input-group-2">
      <div class="input-box">
        <label>Subject</label>
        <input type="number" placeholder="Ex: +91 123456789" formControlName="phoneNumber">
      </div>
      <div class="input-box">
        <label>Subject</label>
        <textarea name="" id="" cols="30" rows="6" placeholder="Your Message" formControlName="message"></textarea>
      </div>
      <button class="ctm-basic-btn ctm-btn-style-1 btn-slide-animation slide-transparent" type="submit"
        [disabled]="isFormSubmitting">Send
        Message</button>
    </div>
  </form>
  <div class="social-icons">
    <a href="https://www.linkedin.com/in/tagore-banda/" target="_blank" class="btn-slide-animation slide-main"><i
        class='bx bxl-linkedin'></i></a>
    <a href="https://github.com/tagore9930" target="_blank" class="btn-slide-animation slide-main"><i
        class='bx bxl-github'></i></a>
    <a href="https://api.whatsapp.com/send?phone=917026756993" target="_blank" class="btn-slide-animation slide-main"><i
        class='bx bxl-whatsapp'></i></a>
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=tagore9930@gmail.com" target="_blank"
      class="btn-slide-animation slide-main"><i class='bx bxl-gmail'></i></a>
  </div>
  <div class="copy-right-section text-center">
    Super-powered by Banda Tagore © 2025 •
    <a href="https://github.com/Tagore9930/portfolio">source code</a>
    <p><small>Last updated: May 31, 2025</small></p>
  </div>
</div>
